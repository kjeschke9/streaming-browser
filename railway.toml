[build]
builder = "nixpacks"
buildCommand = "npm install && cd apps/backend && npx prisma generate && npm run build"

[deploy]
startCommand = "cd apps/backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
